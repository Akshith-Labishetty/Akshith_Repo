<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calculator</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1e1e2e; display: flex; min-height: 100vh; margin: 0; align-items: center; justify-content: center; }
  .calc { background: #2a2a3c; padding: 16px; border-radius: 12px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,.4); }
  .display { background: #11111b; color: #fff; font-size: 2rem; text-align: right; padding: 16px; border-radius: 8px; margin-bottom: 12px; min-height: 2.5rem; word-break: break-all; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button { border: 0; padding: 18px 0; font-size: 1.1rem; border-radius: 8px; background: #45475a; color: #fff; cursor: pointer; }
  button:hover { background: #585b70; }
  .op { background: #f9a03f; }
  .op:hover { background: #ffb454; }
  .eq { background: #a6e3a1; color: #11111b; }
  .eq:hover { background: #b9f0b0; }
  .span2 { grid-column: span 2; }
</style>
</head>
<body>
  <div class="calc">
    <div class="display" id="display">0</div>
    <div class="grid">
      <button data-act="clear">C</button>
      <button data-act="del">⌫</button>
      <button class="op" data-val="%">%</button>
      <button class="op" data-val="/">÷</button>

      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button class="op" data-val="*">×</button>

      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button class="op" data-val="-">−</button>

      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button class="op" data-val="+">+</button>

      <button class="span2" data-val="0">0</button>
      <button data-val=".">.</button>
      <button class="eq" data-act="eq">=</button>
    </div>
  </div>

<script>
const display = document.getElementById("display");
let expr = "";

function render() { display.textContent = expr || "0"; }

// Safe eval: only digits, operators, %, dot allowed. No Function/eval on raw input.
function calc(s) {
  const tokens = s.match(/(\d+\.?\d*|[+\-*/%])/g);
  if (!tokens) return "";
  // shunting-yard to RPN then evaluate — avoids eval()
  const prec = { "+": 1, "-": 1, "*": 2, "/": 2, "%": 2 };
  const out = [], ops = [];
  for (const t of tokens) {
    if (/\d/.test(t)) out.push(parseFloat(t));
    else {
      while (ops.length && prec[ops.at(-1)] >= prec[t]) out.push(ops.pop());
      ops.push(t);
    }
  }
  while (ops.length) out.push(ops.pop());
  const st = [];
  for (const t of out) {
    if (typeof t === "number") { st.push(t); continue; }
    const b = st.pop(), a = st.pop();
    if (a === undefined || b === undefined) return "Error";
    st.push(t === "+" ? a + b : t === "-" ? a - b : t === "*" ? a * b : t === "%" ? a % b : b === 0 ? NaN : a / b);
  }
  const r = st.pop();
  return Number.isFinite(r) ? String(+r.toFixed(10)) : "Error";
}

document.querySelector(".grid").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (!b) return;
  const act = b.dataset.act, val = b.dataset.val;
  if (act === "clear") expr = "";
  else if (act === "del") expr = expr.slice(0, -1);
  else if (act === "eq") expr = calc(expr);
  else if (/[+\-*/%]/.test(val) && (expr === "" || /[+\-*/%]$/.test(expr))) {
    if (expr !== "") expr = expr.slice(0, -1) + val; // replace trailing operator
  } else expr += val;
  render();
});

// keyboard support — native, no lib
document.addEventListener("keydown", e => {
  const k = e.key;
  if (/[\d.+\-*/%]/.test(k)) expr += k;
  else if (k === "Enter" || k === "=") expr = calc(expr);
  else if (k === "Backspace") expr = expr.slice(0, -1);
  else if (k === "Escape") expr = "";
  else return;
  render();
});

render();
</script>
</body>
</html>
