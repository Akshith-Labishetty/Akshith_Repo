<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F172A" />
  <title>Serpent — A Premium Snake Experience</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated ambient background -->
  <div class="ambient" aria-hidden="true">
    <span class="orb orb--1"></span>
    <span class="orb orb--2"></span>
    <span class="orb orb--3"></span>
    <div class="grid-overlay"></div>
  </div>

  <!-- Floating particle canvas (background) -->
  <canvas id="bg-particles" class="bg-particles" aria-hidden="true"></canvas>

  <main class="stage">
    <!-- ============ TOP HUD ============ -->
    <header class="hud" role="banner">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M4 8a4 4 0 0 1 4-4h6a4 4 0 0 1 0 8H9a2 2 0 0 0 0 4h7"
                  stroke="url(#lg)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="19" cy="16" r="1.6" fill="#22C55E"/>
            <defs>
              <linearGradient id="lg" x1="4" y1="4" x2="20" y2="16" gradientUnits="userSpaceOnUse">
                <stop stop-color="#22C55E"/><stop offset="1" stop-color="#06B6D4"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="brand__name">Serpent</span>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat__label">Score</span>
          <span class="stat__value" id="score">0</span>
        </div>
        <div class="stat stat--divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat__label">Best</span>
          <span class="stat__value stat__value--accent" id="high-score">0</span>
        </div>
      </div>

      <div class="hud__actions">
        <button class="icon-btn" id="btn-sound" aria-label="Toggle sound" title="Sound">
          <svg class="ico ico--sound-on" viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
            <path d="M16 8.5a4 4 0 0 1 0 7M18.5 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="ico ico--sound-off" viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
            <path d="M16 9l5 5M21 9l-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-pause" aria-label="Pause game" title="Pause" disabled>
          <svg class="ico ico--pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/>
          </svg>
          <svg class="ico ico--play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M8 5.5v13l11-6.5L8 5.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ============ GAME BOARD ============ -->
    <section class="board-wrap">
      <div class="board" id="board">
        <canvas id="game" width="600" height="600"></canvas>

        <!-- START SCREEN -->
        <div class="overlay overlay--start is-active" id="screen-start">
          <div class="panel">
            <div class="logo-hero" aria-hidden="true">
              <div class="logo-hero__ring"></div>
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none">
                <path d="M4 8a4 4 0 0 1 4-4h6a4 4 0 0 1 0 8H9a2 2 0 0 0 0 4h7"
                      stroke="url(#lg2)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="19" cy="16" r="1.8" fill="#22C55E"/>
                <defs><linearGradient id="lg2" x1="4" y1="4" x2="20" y2="16" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#22C55E"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
              </svg>
            </div>
            <h1 class="panel__title">Serpent</h1>
            <p class="panel__subtitle">A minimalist arcade classic, reimagined.</p>

            <div class="segmented" role="radiogroup" aria-label="Difficulty">
              <span class="segmented__thumb" id="seg-thumb"></span>
              <button class="segmented__opt" data-difficulty="easy" role="radio" aria-checked="false">Easy</button>
              <button class="segmented__opt is-selected" data-difficulty="medium" role="radio" aria-checked="true">Medium</button>
              <button class="segmented__opt" data-difficulty="hard" role="radio" aria-checked="false">Hard</button>
            </div>

            <label class="toggle-row">
              <span class="toggle-row__label">Obstacles</span>
              <span class="switch">
                <input type="checkbox" id="toggle-obstacles" />
                <span class="switch__track"><span class="switch__thumb"></span></span>
              </span>
            </label>

            <button class="btn btn--primary" id="btn-play">
              <span>Play</span>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5.5v13l11-6.5L8 5.5z"/></svg>
            </button>

            <p class="hint">
              <kbd>W A S D</kbd> or <kbd>↑ ↓ ← →</kbd> to move · <kbd>Space</kbd> to pause · Swipe on mobile
            </p>
          </div>
        </div>

        <!-- PAUSE SCREEN -->
        <div class="overlay overlay--pause" id="screen-pause">
          <div class="panel panel--compact">
            <h2 class="panel__title panel__title--sm">Paused</h2>
            <p class="panel__subtitle">Take a breath.</p>
            <button class="btn btn--primary" id="btn-resume">
              <span>Resume</span>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5.5v13l11-6.5L8 5.5z"/></svg>
            </button>
            <button class="btn btn--ghost" id="btn-quit">Main Menu</button>
          </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div class="overlay overlay--over" id="screen-over">
          <div class="panel panel--compact">
            <span class="badge" id="over-badge">Game Over</span>
            <h2 class="panel__title panel__title--sm">Nice run</h2>
            <div class="score-grid">
              <div class="score-cell">
                <span class="score-cell__label">Score</span>
                <span class="score-cell__value" id="final-score">0</span>
              </div>
              <div class="score-cell">
                <span class="score-cell__label">Best</span>
                <span class="score-cell__value score-cell__value--accent" id="final-high">0</span>
              </div>
            </div>
            <button class="btn btn--primary" id="btn-again">
              <span>Play Again</span>
            </button>
            <button class="btn btn--ghost" id="btn-share">
              <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/>
              </svg>
              <span id="share-label">Share Score</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ MOBILE CONTROLS ============ -->
    <div class="dpad" id="dpad" aria-hidden="true">
      <button class="dpad__btn dpad__btn--up" data-dir="up" aria-label="Up">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
      </button>
      <button class="dpad__btn dpad__btn--left" data-dir="left" aria-label="Left">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
      <button class="dpad__btn dpad__btn--right" data-dir="right" aria-label="Right">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="dpad__btn dpad__btn--down" data-dir="down" aria-label="Down">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <footer class="footer">
      <span>Crafted with precision · Vanilla JS</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
